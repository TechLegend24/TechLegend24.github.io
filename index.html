<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <style>
      :root {
        --bg: #0b0f19;
        --card-bg: #131a26;
        --border: #222f47;
        --text-main: #ffffff;
        --text-sub: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        background-color: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 32px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--text-sub);
        margin-bottom: 24px;
      }

      .stack {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .tech {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent);
        background-color: rgba(56, 189, 248, 0.1);
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid rgba(56, 189, 248, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hi, I'm a developer.</h1>
      <p>I focus on building clean applications, exploring new hardware, and working across software ecosystems.</p>
      <div class="stack">
        <span class="tech">Python</span>
        <span class="tech">Swift</span>
        <span class="tech">Web</span>
      </div>
    </div>
  </body>
</html>
